<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOM_B</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Minecraft',sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
}

/* BG */
.bg-image{
  position:fixed;
  inset:0;
  background:url("https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExM25xcjVqbW9reG44aG8wc3gybzhtb2JmODlzbGd3ZWxzc3c5OWtycSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aiaWqNYWKrYigXbupB/giphy.gif");
  background-size:cover;
  background-position:center;
  z-index:-2;
}

.bg-dark{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:-1;
}

/* ENTER */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,.2);
  z-index:10;
}

.btn{
  padding:14px 40px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,.5);
  background:rgba(255,255,255,.4);
  cursor:pointer;
}

/* WRAPPER */
.wrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:0;
}

/* CARD */
.card{
  width:340px;
  min-height:620px;
  padding:25px;
  background:rgba(120,120,120,.20);
  border:2px solid rgba(255,255,255,.9);
  border-radius:25px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  display:none;
  flex-direction:column;
  gap:15px;
  transform:translateY(-40px);
}

/* PROFILE */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* AVATAR */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.8);
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* NAME BOX */
#typing{
  font-size:20px;
  color:#fff;

  display:inline-flex;
  align-items:center;
  gap:4px;

  padding:8px 14px;
  margin-top:10px;

  background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.8);
  border-radius:20px;
  backdrop-filter:blur(10px);

  min-width:140px;
  min-height:38px;
  white-space:nowrap;
}

/* cursor */
.cursor{
  width:2px;
  height:18px;
  background:#fff;
  animation:blink 0.8s infinite;
}

@keyframes blink{
  0%,50%{opacity:1;}
  51%,100%{opacity:0;}
}

/* DESC */
.desc-box{
  font-size:12px;
  color:#fff;
  background:rgba(255,255,255,.12);
  padding:6px 10px;
  border-radius:10px;
}

/* MUSIC */
.music-box{
  width:100%;
  padding:12px;
  margin-top:40px;
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.8);
  border-radius:25px;
  backdrop-filter:blur(10px);
}

.music-cover{
  width:75px;
  height:75px;
  border-radius:18px;
  object-fit:cover;
}

.music-info{
  flex:1;
}

.music-title{
  color:#fff;
  font-size:13px;
}

.music-artist{
  color:#ddd;
  font-size:11px;
  margin-bottom:6px;
}

#progress{
  width:100%;
  accent-color:#ff2d8f;
  margin:6px 0;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.controls button{
  background:rgba(255,255,255,.3);
  border:1px solid rgba(255,255,255,.6);
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
  color:white;
  font-size:14px;
  width:36px;
}

/* ICONS */
.icons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:auto;
}

.icons a{
  width:50px;
  height:50px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  text-decoration:none;
  font-size:24px;
}

.icons a.instagram{
  background:radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
  color:white;
}

.icons a.discord{
  background:#5865F2;
  color:white;
}

.icons a.tiktok{
  background:#000;
  color:white;
}
</style>
</head>

<body>

<div class="bg-image"></div>
<div class="bg-dark"></div>

<div class="overlay" id="overlay">
  <button class="btn" onclick="enterSite()">CLICK TO ENTER</button>
</div>

<div class="wrapper">
  <div class="card" id="card">

    <div class="profile">
      <img class="avatar" src="https://files.catbox.moe/ilf0uc.png">

      <div id="typing">
        <span id="text"></span><span class="cursor"></span>
      </div>

      <div class="desc-box">I'm Very Cool😎</div>
    </div>

    <p style="color:white;">Developer • Designer • Creator</p>

    <!-- MUSIC -->
    <div class="music-box">

      <img class="music-cover"
        src="https://img.youtube.com/vi/9cA9yYVYoTo/maxresdefault.jpg"
        onerror="this.src='https://img.youtube.com/vi/9cA9yYVYoTo/hqdefault.jpg';">

      <div class="music-info">

        <div class="music-title">My Favorite Song</div>
        <div class="music-artist">YouTube Music</div>

        <input type="range" id="progress" value="0" min="0" max="100">

        <div class="controls">
          <button onclick="rewind()"><i class="fa-solid fa-backward-step"></i></button>
          <button onclick="togglePlay()" id="playBtn"><i class="fa-solid fa-play"></i></button>
          <button onclick="forward()"><i class="fa-solid fa-forward-step"></i></button>
        </div>

        <audio id="music">
          <source src="music.mp3" type="audio/mp3">
        </audio>

      </div>
    </div>

    <div class="icons">
      <a href="#" class="instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" class="discord"><i class="fa-brands fa-discord"></i></a>
      <a href="#" class="tiktok"><i class="fa-brands fa-tiktok"></i></a>
    </div>

  </div>
</div>

<script>
const music = document.getElementById("music");
const progress = document.getElementById("progress");
const playBtn = document.getElementById("playBtn");

function enterSite(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("card").style.display="flex";
  typeLoop();
}

function togglePlay(){
  if(music.paused){
    music.play();
    playBtn.innerHTML='<i class="fa-solid fa-pause"></i>';
  }else{
    music.pause();
    playBtn.innerHTML='<i class="fa-solid fa-play"></i>';
  }
}

music.addEventListener("timeupdate",()=>{
  progress.value=(music.currentTime/music.duration)*100||0;
});

progress.addEventListener("input",()=>{
  music.currentTime=(progress.value/100)*music.duration;
});

function rewind(){ music.currentTime-=10; }
function forward(){ music.currentTime+=10; }

/* typing effect */
function typeLoop(){
  const text="boom_.11";
  const el=document.getElementById("text");

  let i=0;
  let del=false;

  function loop(){
    el.textContent=text.substring(0,i);

    if(!del){
      i++;
      if(i>text.length){
        del=true;
        setTimeout(loop,800);
        return;
      }
    }else{
      i--;
      if(i<0){
        del=false;
        i=0;
        setTimeout(loop,500);
        return;
      }
    }

    setTimeout(loop,del?160:110);
  }

  loop();
}

window.addEventListener("beforeunload",()=>{
  music.pause();
  music.currentTime=0;
});
</script>

</body>
</html>
