<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOOM_B</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow:hidden;

  /* 🤍 WHITE GLASS BACKGROUND */
  background:linear-gradient(135deg,#ffffff,#e9e9e9);
  animation:bgMove 10s infinite alternate ease-in-out;

  font-family:Arial;
  color:#111;
}

@keyframes bgMove{
  0%{filter:brightness(1);}
  100%{filter:brightness(1.05);}
}

/* glow white glass */
.bg{
  position:fixed;
  width:600px;
  height:600px;

  background:radial-gradient(circle,
    rgba(255,255,255,0.95),
    rgba(200,200,200,0.15)
  );

  filter:blur(200px);
  opacity:0.6;

  border-radius:50%;
  animation:floatBG 12s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes floatBG{
  0%{transform:translate(-80px,-80px) scale(1);}
  100%{transform:translate(80px,80px) scale(1.2);}
}

/* overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(30px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  transition:0.6s;
}

.btn{
  padding:14px 40px;
  border-radius:20px;

  border:1px solid rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.4);

  cursor:pointer;
  transition:.3s;
  backdrop-filter:blur(15px);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.btn:hover{
  background:rgba(0,0,0,0.85);
  color:#fff;
}

/* wrapper */
.wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:60px;
}

/* 🤍 GLASS CARD */
.card{
  width:340px;
  padding:25px;

  background:rgba(255,255,255,0.35);
  border:1px solid rgba(255,255,255,0.6);

  border-radius:25px;

  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);

  box-shadow:0 25px 70px rgba(0,0,0,0.08);

  text-align:center;
  animation:cardIn 1s ease;
}

@keyframes cardIn{
  from{opacity:0; transform:translateY(40px) scale(0.9);}
  to{opacity:1; transform:translateY(0) scale(1);}
}

/* avatar */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;

  border:2px solid rgba(255,255,255,0.8);

  margin-bottom:15px;
  animation:float 3s infinite ease-in-out;

  display:block;
  margin:auto;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* typing name */
#typing::after{
  content:"|";
  animation:blink 0.7s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* text */
p{
  color:#444;
  font-size:12px;
  margin-bottom:15px;
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:20px;
}

.icons a{
  width:55px;
  height:55px;

  display:flex;
  justify-content:center;
  align-items:center;

  border-radius:16px;

  background:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.7);

  backdrop-filter:blur(20px);

  color:#111;
  font-size:22px;

  transition:.3s;

  text-decoration:none;
}

.icons a:hover{
  transform:scale(1.2) rotate(5deg);
  background:rgba(0,0,0,0.85);
  color:#fff;
}

</style>
</head>

<body>

<div class="bg"></div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="overlay" id="overlay">
  <button class="btn" onclick="enterSite()">CLICK TO ENTER</button>
</div>

<div class="wrapper">

  <div class="card" id="card" style="display:none;">

    <img class="avatar" src="https://i.imgur.com/2DhmtJ4.jpeg">

    <h1 id="typing"></h1>
    <p>Developer • Designer • Creator</p>

    <div class="icons">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-discord"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok"></i></a>
    </div>

  </div>

</div>

<script>

const text = "BOOM_B";
let index = 0;
let isDeleting = false;

function typeEffect(){
  const el = document.getElementById("typing");

  if(!isDeleting){
    el.textContent = text.substring(0, index + 1);
    index++;

    if(index === text.length){
      isDeleting = true;
      setTimeout(typeEffect, 1000);
      return;
    }
  }else{
    el.textContent = text.substring(0, index - 1);
    index--;

    if(index === 0){
      isDeleting = false;
    }
  }

  setTimeout(typeEffect, isDeleting ? 80 : 150);
}

function enterSite(){
  const overlay = document.getElementById("overlay");
  const music = document.getElementById("music");
  const card = document.getElementById("card");

  music.play();

  overlay.style.opacity = "0";

  setTimeout(()=>{
    overlay.style.display="none";
    card.style.display="block";
    typeEffect();
  },600);
}

</script>

</body>
</html>
