<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOOM_B</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow:hidden;

  /* 🔥 เทาอ่อนแทนขาว */
  background:linear-gradient(135deg,#dcdcdc,#bfbfbf);
  animation:bgMove 10s infinite alternate ease-in-out;

  font-family:Arial;
  color:#111;
}

/* background movement */
@keyframes bgMove{
  0%{filter:brightness(1);}
  100%{filter:brightness(1.1);}
}

/* glow */
.bg{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(255,255,255,0.8),rgba(120,120,120,0.2));
  filter:blur(220px);
  opacity:0.35;
  border-radius:50%;
  animation:floatBG 12s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes floatBG{
  0%{transform:translate(-80px,-80px) scale(1);}
  100%{transform:translate(80px,80px) scale(1.2);}
}

/* overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(30px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  transition:0.6s;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.btn{
  padding:14px 40px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.2);
  cursor:pointer;
  transition:.3s;
  backdrop-filter:blur(15px);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

.btn:hover{
  background:rgba(0,0,0,0.85);
  color:#fff;
}

/* wrapper */
.wrapper{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* card */
.card{
  width:340px;
  padding:25px;

  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);

  border-radius:25px;

  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);

  box-shadow:0 25px 70px rgba(0,0,0,0.1);

  text-align:center;

  animation:cardIn 1s ease;
}

@keyframes cardIn{
  from{
    opacity:0;
    transform:translateY(40px) scale(0.9);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

/* avatar */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.6);
  margin-bottom:15px;

  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

h1{
  font-family:'Press Start 2P', cursive;
  font-size:16px;
  margin-bottom:10px;

  animation:fadeUp 1.2s ease;
}

p{
  color:#444;
  font-size:12px;
  margin-bottom:15px;

  animation:fadeUp 1.4s ease;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* icons */
.icons{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:20px;

  animation:fadeUp 1.6s ease;
}

.icons a{
  width:55px;
  height:55px;

  display:flex;
  justify-content:center;
  align-items:center;

  border-radius:16px;

  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.25);

  backdrop-filter:blur(20px);

  color:#111;
  font-size:22px;

  transition:.3s;

  animation:floatIcon 3s infinite ease-in-out;
}

.icons a:nth-child(2){
  animation-delay:0.2s;
}
.icons a:nth-child(3){
  animation-delay:0.4s;
}

@keyframes floatIcon{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.icons a:hover{
  transform:scale(1.2) rotate(5deg);
  background:rgba(0,0,0,0.85);
  color:#fff;
}

</style>
</head>

<body>

<div class="bg"></div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="overlay" id="overlay">
  <button class="btn" onclick="enterSite()">CLICK TO ENTER</button>
</div>

<div class="wrapper">

  <div class="card" id="card" style="display:none;">

    <img class="avatar" src="https://i.imgur.com/2DhmtJ4.jpeg">

    <h1>BOOM_B</h1>
    <p>Developer • Designer • Creator</p>

    <!-- 3 ICONS -->
    <div class="icons">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-discord"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok"></i></a>
    </div>

  </div>

</div>

<script>

function enterSite(){

  const overlay = document.getElementById("overlay");
  const music = document.getElementById("music");
  const card = document.getElementById("card");

  music.play();

  overlay.style.opacity = "0";

  setTimeout(()=>{
    overlay.style.display="none";
    card.style.display="block";
  },600);
}

</script>

</body>
</html>
