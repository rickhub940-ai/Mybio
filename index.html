<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BOOM_B</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Minecraft', sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
.bg-image{
  position:fixed;
  inset:0;
  background:url("https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExM25xcjVqbW9reG44aG8wc3gybzhtb2JmODlzbGd3ZWxzc3c5OWtycSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aiaWqNYWKrYigXbupB/giphy.gif");
  background-size:cover;
  background-position:center;
  z-index:-2;
}

.bg-dark{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:-1;
}

/* ENTER */
.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,0.2);
  z-index:10;
}

.btn{
  padding:14px 40px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,0.5);
  background:rgba(255,255,255,0.4);
  cursor:pointer;
}

/* WRAPPER */
.wrapper{
  height:100vh;
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
  padding:70px 0 0 30px;
}

/* CARD (เทา + ขอบขาว) */
.card{
  width:340px;
  min-height:520px;
  padding:25px;

  background:rgba(120,120,120,0.20);

  border:2px solid rgba(255,255,255,0.9);

  border-radius:25px;

  box-shadow:0 20px 60px rgba(0,0,0,0.25);

  display:none;
  flex-direction:column;
  gap:12px;
}

/* PROFILE */
.profile{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;
}

/* AVATAR */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.8);
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* NAME */
#typing{
  font-size:20px;
  color:#d1007a;
  text-shadow:0 0 3px rgba(209,0,122,0.3);

  display:inline-block;
  min-width:120px;
  height:24px;
  line-height:24px;
}

/* DESCRIPTION BOX */
.desc-box{
  font-size:12px;
  color:#fff;
  background:rgba(209,0,122,0.25);
  padding:6px 10px;
  border-radius:10px;
  border:1px solid rgba(209,0,122,0.6);
  display:inline-block;
}

p{
  font-size:12px;
  color:#444;
}

/* ICONS */
.icons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:auto;
  width:100%;
}

.icons a{
  width:50px;
  height:50px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  background:rgba(255,255,255,0.4);
  border:1px solid rgba(0,0,0,0.4);
  text-decoration:none;
  transition:.3s;
  font-size:22px;
}

.icons a:nth-child(1){ color:#E1306C; }
.icons a:nth-child(2){ color:#5865F2; }
.icons a:nth-child(3){ color:#111; }

.icons a:hover{
  transform:scale(1.15);
  filter:brightness(1.3);
}

</style>
</head>

<body>

<div class="bg-image"></div>
<div class="bg-dark"></div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="overlay" id="overlay">
  <button class="btn" onclick="enterSite()">CLICK TO ENTER</button>
</div>

<div class="wrapper">
  <div class="card" id="card">

    <div class="profile">
      <img class="avatar" src="https://files.catbox.moe/ilf0uc.png">

      <h1 id="typing"></h1>

      <div class="desc-box">
        I'm Very Cool😎
      </div>
    </div>

    <p>Developer • Designer • Creator</p>

    <div class="icons">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-discord"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok"></i></a>
    </div>

  </div>
</div>

<script>

function enterSite(){
  const overlay = document.getElementById("overlay");
  const card = document.getElementById("card");
  const music = document.getElementById("music");

  music.play();

  overlay.style.opacity = "0";

  setTimeout(()=>{
    overlay.style.display="none";
    card.style.display="flex";

    typeLoop();
  },600);
}

/* typing + delete loop */
function typeLoop(){
  const text = "boom_.11";
  const el = document.getElementById("typing");

  let i = 0;
  let deleting = false;

  function loop(){

    if(!deleting){
      el.innerHTML = text.substring(0, i);
      i++;

      if(i > text.length){
        deleting = true;
        setTimeout(loop, 800);
        return;
      }

    }else{
      el.innerHTML = text.substring(0, i);
      i--;

      if(i < 0){
        deleting = false;
        setTimeout(loop, 300);
        i = 0;
        return;
      }
    }

    setTimeout(loop, deleting ? 80 : 120);
  }

  loop();
}

</script>

</body>
</html>
