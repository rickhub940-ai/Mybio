<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOM_B</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Minecraft',sans-serif;
}

body{
  min-height:100vh;
  overflow:hidden;
}

.bg-image{
  position:fixed;
  inset:0;
  background:url("https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExM25xcjVqbW9reG44aG8wc3gybzhtb2JmODlzbGd3ZWxzc3c5OWtycSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/aiaWqNYWKrYigXbupB/giphy.gif");
  background-size:cover;
  background-position:center;
  z-index:-2;
}

.bg-dark{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:-1;
}

.overlay{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,.2);
  z-index:10;
}

.btn{
  padding:14px 40px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,.5);
  background:rgba(255,255,255,.4);
  cursor:pointer;
}

.wrapper{
  height:100vh;
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
  padding:70px 0 0 30px;
}

.card{
  width:340px;
  min-height:620px;
  padding:25px;
  background:rgba(120,120,120,.20);
  border:2px solid rgba(255,255,255,.9);
  border-radius:25px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
  display:none;
  flex-direction:column;
  gap:15px;
}

.profile{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.8);
  box-shadow:0 0 15px rgba(0,0,0,.3);
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

#typing{
  font-size:20px;
  color:#d1007a;
}

.desc-box{
  font-size:12px;
  color:#fff;
  background:rgba(209,0,122,.25);
  padding:6px 10px;
  border-radius:10px;
  border:1px solid rgba(209,0,122,.6);
  display:inline-block;
}

.music-box{
  width:100%;
  padding:12px;
  margin-top:25px;
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.8);
  border-radius:25px;
  backdrop-filter:blur(10px);
}

.music-cover{
  width:75px;
  height:75px;
  border-radius:18px;
  object-fit:cover;
}

.music-info{
  flex:1;
}

.music-title{
  color:#fff;
  font-size:13px;
  margin-bottom:4px;
}

.music-artist{
  color:#ddd;
  font-size:11px;
  margin-bottom:8px;
}

#music{
  width:100%;
  height:32px;
}

.icons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:auto;
}

.icons a{
  width:50px;
  height:50px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  background:rgba(255,255,255,.4);
  border:1px solid rgba(0,0,0,.4);
  text-decoration:none;
  font-size:22px;
  transition:.3s;
}

.icons a:nth-child(1){color:#E1306C;}
.icons a:nth-child(2){color:#5865F2;}
.icons a:nth-child(3){color:#111;}

.icons a:hover{
  transform:scale(1.15);
}
</style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg-dark"></div>

<div class="overlay" id="overlay">
  <button class="btn" onclick="enterSite()">CLICK TO ENTER</button>
</div>

<div class="wrapper">
  <div class="card" id="card">

    <div class="profile">
      <img class="avatar" src="https://files.catbox.moe/ilf0uc.png">

      <h1 id="typing"></h1>

      <div class="desc-box">
        I'm Very Cool😎
      </div>
    </div>

    <p style="color:white;">Developer • Designer • Creator</p>

    <div class="music-box">
      <img
        src="https://img.youtube.com/vi/9cA9yYVYoTo/maxresdefault.jpg"
        class="music-cover"
        onerror="this.src='https://img.youtube.com/vi/9cA9yYVYoTo/hqdefault.jpg';"
      >

      <div class="music-info">
        <div class="music-title">
          My Favorite Song
        </div>

        <div class="music-artist">
          YouTube Music
        </div>

        <audio id="music" controls>
          <source src="music.mp3" type="audio/mp3">
        </audio>
      </div>
    </div>

    <div class="icons">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-discord"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok"></i></a>
    </div>

  </div>
</div>

<script>
const music = document.getElementById("music");

function enterSite(){
  const overlay = document.getElementById("overlay");
  const card = document.getElementById("card");

  overlay.style.opacity = "0";

  setTimeout(()=>{
    overlay.style.display = "none";
    card.style.display = "flex";

    music.play().catch(()=>{});
    typeLoop();
  },600);
}

function typeLoop(){
  const text = "boom_.11";
  const el = document.getElementById("typing");

  let i = 0;
  let deleting = false;

  function loop(){
    if(!deleting){
      el.innerHTML = text.substring(0,i);
      i++;

      if(i > text.length){
        deleting = true;
        setTimeout(loop,800);
        return;
      }
    }else{
      el.innerHTML = text.substring(0,i);
      i--;

      if(i < 0){
        deleting = false;
        i = 0;
        setTimeout(loop,300);
        return;
      }
    }

    setTimeout(loop, deleting ? 80 : 120);
  }

  loop();
}

window.addEventListener("beforeunload",()=>{
  music.pause();
  music.currentTime = 0;
});

document.addEventListener("visibilitychange",()=>{
  if(document.hidden){
    music.pause();
  }
});
</script>

</body>
  </html>
